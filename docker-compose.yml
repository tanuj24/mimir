# Mimir — the whole stack in one command:
#   docker compose up -d   →   open http://localhost:8080
#
# By default this PULLS the prebuilt images from Docker Hub (tanujsoni027/mimir-aws),
# so nothing compiles locally. To build from source instead (for development),
# run:  docker compose up -d --build
#
# Bundles (single repo, v2):
#   mimir-backend  the local AWS emulator (Quarkus)
#   mimir-server   the API/proxy + local Glue execution engine
#   mimir-web      the console UI (nginx, proxies /api -> mimir-server)

name: mimir

services:
  mimir-backend:
    image: tanujsoni027/mimir-aws:backend
    build:
      context: ./mimir-backend
      dockerfile: docker/Dockerfile
    container_name: mimir-backend
    tty: true
    ports:
      - "4566:4566" # AWS edge / gateway
      - "6379-6399:6379-6399" # ElastiCache / Redis
      - "7001-7099:7001-7099" # RDS proxies
      - "9200-9299:9200-9299" # OpenSearch
    volumes:
      # The backend runs real engines (Lambda, EC2, RDS, …) as Docker containers.
      - /var/run/docker.sock:/var/run/docker.sock
      - mimir-backend-data:/app/data
    environment:
      MIMIR_HOSTNAME: mimir-backend
      MIMIR_BASE_URL: http://mimir:4566
      MIMIR_SERVICES_DOCKER_NETWORK: mimir_default
      MIMIR_SERVICES_RDS_PROXY_BASE_PORT: "7001"
      MIMIR_SERVICES_LAMBDA_HOT_RELOAD_ENABLED: "true"
    networks:
      default:
        # Aliases so MIMIR_BASE_URL (http://mimir:4566) and any LocalStack-parity
        # hostnames resolve on the compose network.
        aliases:
          - mimir
          - localhost.mimir.local
    restart: unless-stopped

  mimir-server:
    image: tanujsoni027/mimir-aws:server
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: mimir-server
    depends_on:
      mimir-backend:
        condition: service_healthy
    environment:
      BACKEND_ENDPOINT: http://mimir:4566 # server -> backend (internal network)
      PUBLIC_BACKEND_ENDPOINT: http://localhost:4566 # browser-facing (presigned URLs)
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: mimir
      AWS_SECRET_ACCESS_KEY: mimir
      PORT: "4000"
      GLUE_WORK_DIR: /tmp/mimir-glue
      # Glue job/notebook containers run on the HOST daemon (not this compose
      # network), so they reach the backend via the host gateway's published port.
      GLUE_AWS_ENDPOINT: http://host.docker.internal:4566
    ports:
      - "4000:4000"
    volumes:
      # Launch Glue job/notebook containers on the host daemon…
      - /var/run/docker.sock:/var/run/docker.sock
      # …and share the work dir at an IDENTICAL path so their bind mounts resolve.
      - /tmp/mimir-glue:/tmp/mimir-glue
    restart: unless-stopped

  mimir-web:
    image: tanujsoni027/mimir-aws:web
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: mimir-web
    depends_on:
      - mimir-server
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  mimir-backend-data:

networks:
  default:
    name: mimir_default
