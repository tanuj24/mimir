# Mimir — the whole stack in one command:
#   docker compose up -d   →   open http://localhost:8080
#
# Bundles:
#   floci         the local AWS backend (https://floci.io)
#   mimir-server  the API/proxy + local Glue execution engine
#   mimir-web     the console UI (nginx, proxies /api -> mimir-server)

name: mimir

services:
  floci:
    image: floci/floci:latest
    container_name: mimir-floci
    ports:
      - "4566:4566"
    volumes:
      # Floci runs real engines (Lambda, RDS, …) as Docker containers.
      - /var/run/docker.sock:/var/run/docker.sock
      - floci-data:/app/data
    restart: unless-stopped

  mimir-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: mimir-server
    depends_on:
      - floci
    environment:
      FLOCI_ENDPOINT: http://floci:4566        # server -> floci (internal network)
      PUBLIC_FLOCI_ENDPOINT: http://localhost:4566  # browser-facing (presigned URLs)
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: mimir
      AWS_SECRET_ACCESS_KEY: mimir
      PORT: "4000"
      GLUE_WORK_DIR: /tmp/mimir-glue
    ports:
      - "4000:4000"
    volumes:
      # Launch Glue job/notebook containers on the host daemon…
      - /var/run/docker.sock:/var/run/docker.sock
      # …and share the work dir at an IDENTICAL path so their bind mounts resolve.
      - /tmp/mimir-glue:/tmp/mimir-glue
    restart: unless-stopped

  mimir-web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: mimir-web
    depends_on:
      - mimir-server
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  floci-data:
