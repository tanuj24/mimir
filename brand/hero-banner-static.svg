<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#0a0f1f"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1f4a6d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0f1f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgb(59, 130, 246)" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect width="1600" height="900" fill="url(#glowGrad)"/>

  <g transform="translate(800, 300)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#3f82c4" stroke-width="35" opacity="0.8"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#3f82c4" stroke-width="32" opacity="0.7"/>
    <circle cx="0" cy="0" r="240" fill="none" stroke="#3f82c4" stroke-width="28" opacity="0.4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3f82c4" stroke-width="24" opacity="0.6"/>

    <g stroke="#ff9500" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8">
      <path d="M -200,-100 Q -150,-180 -80,-200 L -50,-200 L -80,-230 L -110,-200"/>
      <path d="M 200,-100 Q 150,-180 80,-200 L 50,-200 L 80,-230 L 110,-200"/>
      <path d="M -180,180 Q -120,220 -40,240 L 0,250 L -30,280 L -60,250"/>
      <path d="M 180,180 Q 120,220 40,240 L 0,250 L 30,280 L 60,250"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="-60" y="-60" width="120" height="120" rx="20" fill="#3f82c4"/>
      <g transform="translate(-30, -15)">
        <polyline points="20,10 40,30 20,50" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <line x1="-10" y1="25" x2="30" y2="25" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>

    <circle cx="-280" cy="-120" r="8" fill="#ff9500" opacity="0.7"/>
    <circle cx="280" cy="-120" r="8" fill="#ff9500" opacity="0.7"/>
    <circle cx="-260" cy="220" r="8" fill="#ff9500" opacity="0.7"/>
    <circle cx="260" cy="220" r="8" fill="#ff9500" opacity="0.7"/>
  </g>

  <text x="800" y="680" font-family="'Inter', '-apple-system', sans-serif" font-size="140" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3">MIMIR</text>
  <text x="800" y="760" font-family="'Inter', '-apple-system', sans-serif" font-size="36" font-weight="300" fill="#9aafcd" text-anchor="middle" letter-spacing="2">Mimic &amp; Run</text>
  <text x="800" y="830" font-family="'Inter', '-apple-system', sans-serif" font-size="32" font-weight="300" fill="#cbd5e1" text-anchor="middle" letter-spacing="0.5">See your cloud, before you ship your cloud.</text>

  <g opacity="0.15">
    <polygon points="1350,150 1358,170 1380,170 1363,183 1370,203 1350,190 1330,203 1337,183 1320,170 1342,170" fill="#ff9500"/>
    <polygon points="200,750 206,765 222,765 209,775 215,790 200,780 185,790 191,775 178,765 194,765" fill="#3f82c4"/>
  </g>
</svg>
