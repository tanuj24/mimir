<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Cloud floating animation */
      .cloud-container {
        animation: cloudFloat 4s ease-in-out infinite;
        transform-origin: center;
      }

      @keyframes cloudFloat {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-12px) scale(1.02); }
      }

      /* Checkmark drawing animation */
      .check-stroke {
        stroke: url(#checkGradient);
        stroke-width: 20;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        filter: drop-shadow(0 8px 16px rgba(236, 114, 17, 0.3));
      }

      .check-path-1 {
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: drawCheck1 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      }

      .check-path-2 {
        stroke-dasharray: 160;
        stroke-dashoffset: 160;
        animation: drawCheck2 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
      }

      @keyframes drawCheck1 {
        to { stroke-dashoffset: 0; }
      }

      @keyframes drawCheck2 {
        to { stroke-dashoffset: 0; }
      }

      /* Pulsing glow behind cloud */
      .glow-circle {
        opacity: 0;
        animation: glowPulse 3s ease-in-out 2s infinite;
      }

      @keyframes glowPulse {
        0%, 100% { opacity: 0; r: 90; }
        50% { opacity: 0.4; r: 110; }
      }

      /* Subtle cloud shine */
      .cloud-shine {
        opacity: 0;
        animation: shine 3.5s ease-in-out 1.5s infinite;
      }

      @keyframes shine {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.3; }
      }
    </style>

    <!-- Gradients -->
    <defs>
      <linearGradient id="cloudGradientLeft" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4dd9ff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#36d5c0" stop-opacity="1"/>
      </linearGradient>

      <linearGradient id="cloudGradientRight" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#36d5c0" stop-opacity="1"/>
        <stop offset="100%" stop-color="#0d94d9" stop-opacity="1"/>
      </linearGradient>

      <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4dd9ff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#0d94d9" stop-opacity="1"/>
      </linearGradient>

      <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0d94d9" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#0d94d9" stop-opacity="0"/>
      </radialGradient>
    </defs>
  </defs>

  <g class="cloud-container">
    <!-- Glow pulse behind -->
    <circle class="glow-circle" cx="200" cy="140" r="90" fill="url(#glowGrad)"/>

    <!-- Cloud: Left side (cyan-mint) -->
    <g>
      <!-- Main left cloud body -->
      <ellipse cx="110" cy="140" rx="65" ry="55" fill="url(#cloudGradientLeft)"/>
      <circle cx="70" cy="130" r="45" fill="url(#cloudGradientLeft)"/>
      <circle cx="95" cy="95" r="52" fill="url(#cloudGradientLeft)"/>
    </g>

    <!-- Cloud: Right side (mint-blue) -->
    <g>
      <!-- Main right cloud body -->
      <ellipse cx="290" cy="140" rx="65" ry="55" fill="url(#cloudGradientRight)"/>
      <circle cx="330" cy="130" r="45" fill="url(#cloudGradientRight)"/>
      <circle cx="305" cy="95" r="52" fill="url(#cloudGradientRight)"/>
    </g>

    <!-- Cloud shine (subtle highlight) -->
    <ellipse class="cloud-shine" cx="200" cy="100" rx="120" ry="45" fill="white" opacity="0.25"/>

    <!-- Checkmark in center -->
    <g>
      <!-- Down-left stroke (checkmark bottom) -->
      <polyline class="check-stroke check-path-1" points="160,150 190,180 220,140"/>

      <!-- Up-right stroke (checkmark top) -->
      <polyline class="check-stroke check-path-2" points="220,140 260,100 300,60"/>
    </g>

    <!-- Shadow beneath cloud -->
    <ellipse cx="200" cy="220" rx="140" ry="20" fill="#000" opacity="0.08"/>
  </g>
</svg>
