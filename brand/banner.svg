<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0a1427"/>
      <stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
    <!-- Glow effects -->
    <radialGradient id="glow-orange" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ec7211" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec7211" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-navy" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#1b2a41" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1b2a41" stop-opacity="0"/>
    </radialGradient>
    <!-- Cloud gradients -->
    <linearGradient id="cloud-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="cloud-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec7211"/>
      <stop offset="100%" stop-color="#d45d0b"/>
    </linearGradient>
    <!-- Wordmark gradient -->
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1b2a41" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <!-- Mask for grid fade -->
    <radialGradient id="grid-mask" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>

  <!-- Grid pattern -->
  <g mask="url(#grid-mask)">
    <rect width="1280" height="640" fill="url(#grid-pattern)"/>
  </g>

  <!-- Glows -->
  <rect width="1280" height="640" fill="url(#glow-orange)"/>
  <rect width="1280" height="640" fill="url(#glow-navy)"/>

  <!-- Decorative rings -->
  <circle cx="640" cy="220" r="280" fill="none" stroke="#1b2a41" stroke-width="1" opacity="0.15"/>
  <circle cx="640" cy="220" r="350" fill="none" stroke="#1b2a41" stroke-width="1" opacity="0.08"/>
  <circle cx="640" cy="220" r="420" fill="none" stroke="#ec7211" stroke-width="1" opacity="0.06"/>

  <!-- Cloud mark (centered top) -->
  <g transform="translate(640, 200) scale(2)">
    <!-- Left cloud (local) -->
    <ellipse cx="-25" cy="0" rx="20" ry="16" fill="url(#cloud-light)"/>
    <circle cx="-42" cy="-4" r="13" fill="url(#cloud-light)"/>
    <circle cx="-23" cy="-18" r="16" fill="url(#cloud-light)"/>
    <circle cx="6" cy="-12" r="14" fill="url(#cloud-light)"/>
    <!-- Right cloud (accent) -->
    <ellipse cx="25" cy="0" rx="20" ry="16" fill="url(#cloud-accent)"/>
    <circle cx="42" cy="-4" r="13" fill="url(#cloud-accent)"/>
    <circle cx="23" cy="-18" r="16" fill="url(#cloud-accent)"/>
    <circle cx="-6" cy="-12" r="14" fill="url(#cloud-accent)"/>
    <!-- Connection -->
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#ec7211" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#ec7211"/>
    <!-- Shadow -->
    <ellipse cx="0" cy="32" rx="60" ry="6" fill="#000" opacity="0.08"/>
  </g>

  <!-- Wordmark "Mimir" -->
  <text x="640" y="410"
        font-family="'Inter', '-apple-system', 'Segoe UI', sans-serif"
        font-size="120" font-weight="800" fill="url(#wordmark)"
        text-anchor="middle" letter-spacing="-2">Mimir</text>

  <!-- Tagline -->
  <text x="640" y="460"
        font-family="'Inter', '-apple-system', 'Segoe UI', sans-serif"
        font-size="20" font-weight="300" font-style="italic"
        fill="#7a8aa0" text-anchor="middle" letter-spacing="0.5">See your cloud, before you ship your cloud</text>

  <!-- Divider -->
  <line x1="140" y1="510" x2="1140" y2="510" stroke="#1b2a41" stroke-width="1" opacity="0.3"/>

  <!-- Stats -->
  <g>
    <!-- Local -->
    <text x="280" y="565"
          font-family="'Courier New', monospace"
          font-size="40" font-weight="700" fill="#ec7211" text-anchor="middle">100%</text>
    <text x="280" y="595"
          font-family="'Inter', sans-serif"
          font-size="13" font-weight="500" fill="#9aafcd" text-anchor="middle" letter-spacing="0.4">Local • No AWS</text>
    <line x1="410" y1="525" x2="410" y2="600" stroke="#1b2a41" stroke-width="1" opacity="0.3"/>

    <!-- Open Source -->
    <text x="640" y="565"
          font-family="'Courier New', monospace"
          font-size="40" font-weight="700" fill="#ec7211" text-anchor="middle">MIT</text>
    <text x="640" y="595"
          font-family="'Inter', sans-serif"
          font-size="13" font-weight="500" fill="#9aafcd" text-anchor="middle" letter-spacing="0.4">Open Source</text>
    <line x1="770" y1="525" x2="770" y2="600" stroke="#1b2a41" stroke-width="1" opacity="0.3"/>

    <!-- Services -->
    <text x="1000" y="565"
          font-family="'Courier New', monospace"
          font-size="40" font-weight="700" fill="#ec7211" text-anchor="middle">15+</text>
    <text x="1000" y="595"
          font-family="'Inter', sans-serif"
          font-size="13" font-weight="500" fill="#9aafcd" text-anchor="middle" letter-spacing="0.4">AWS Services</text>
  </g>
</svg>
