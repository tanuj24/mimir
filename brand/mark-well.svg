<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mimir">
  <rect width="64" height="64" rx="15" fill="#16243b"/>
  <!-- Mímir's well: cloud of knowledge above the well's mouth -->
  <g fill="#ffffff">
    <rect x="20" y="19" width="24" height="9" rx="4.5"/>
    <circle cx="27" cy="19" r="6"/>
    <circle cx="35" cy="16" r="7.5"/>
    <circle cx="41" cy="20" r="5.5"/>
  </g>
  <!-- a drop falling into the well -->
  <circle cx="32" cy="34" r="1.8" fill="#ff9900"/>
  <!-- well rings (perspective) -->
  <ellipse cx="32" cy="45" rx="20" ry="7" fill="none" stroke="#ec7211" stroke-width="3"/>
  <ellipse cx="32" cy="45" rx="11.5" ry="3.8" fill="none" stroke="#ffffff" stroke-width="2.4" opacity="0.85"/>
</svg>
