<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mimir">
  <rect width="64" height="64" rx="15" fill="#0f1b2d"/>
  <!-- cloud -->
  <g fill="#ffffff">
    <rect x="16" y="24" width="30" height="11" rx="5.5"/>
    <circle cx="24" cy="24" r="7"/>
    <circle cx="34" cy="21" r="9"/>
    <circle cx="42" cy="25" r="6.5"/>
  </g>
  <!-- waterline -->
  <rect x="12" y="38" width="40" height="1.6" rx="0.8" fill="#ec7211" opacity="0.55"/>
  <!-- reflection (mirrored + faded) = the "preview" -->
  <g fill="#ec7211" opacity="0.45" transform="translate(0,77) scale(1,-1)">
    <rect x="16" y="24" width="30" height="11" rx="5.5"/>
    <circle cx="24" cy="24" r="7"/>
    <circle cx="34" cy="21" r="9"/>
    <circle cx="42" cy="25" r="6.5"/>
  </g>
</svg>
