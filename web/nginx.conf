server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow sizeable S3 object uploads through the proxy.
    client_max_body_size 256m;

    # API calls are proxied to the Mimir server container.
    location /api/ {
        proxy_pass http://mimir-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    # SPA fallback so client-side routes (e.g. /s3/my-bucket) resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
