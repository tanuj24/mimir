services:
  mimir:
    build:
      context: .
      dockerfile: docker/Dockerfile
    tty: true
    ports:
      - "4566:4566"
      - "6379-6399:6379-6399"
      - "7001-7099:7001-7099"
      - "9200-9299:9200-9299"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      MIMIR_SERVICES_DOCKER_NETWORK: mimir_default
      MIMIR_SERVICES_RDS_PROXY_BASE_PORT: "7001"
      # MIMIR_STORAGE_HOST_PERSISTENT_PATH is no longer needed.
      # Mimir now uses named Docker volumes by default.
      # If you were using this env var for persistence, migrate: docker volume ls -f label=mimir=true
      MIMIR_HOSTNAME: mimir
      MIMIR_BASE_URL: http://mimir:4566
      MIMIR_SERVICES_LAMBDA_HOT_RELOAD_ENABLED: "true"
    networks:
      mimir_default:
        aliases:
          - localhost.mimir.local

networks:
  mimir_default:
    name: mimir_default
