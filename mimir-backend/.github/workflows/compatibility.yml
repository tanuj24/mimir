name: Compatibility Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docker/Dockerfile.jvm-package'
      - 'compatibility-tests/**'
      - '.github/workflows/compatibility.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build mimir image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.jvm-package
          tags: mimir:test
          outputs: type=docker,dest=/tmp/mimir-image.tar
          cache-from: type=gha,scope=mimir
          cache-to: type=gha,scope=mimir,mode=max

      - name: Compress image
        run: gzip /tmp/mimir-image.tar

      - name: Upload mimir image
        uses: actions/upload-artifact@v7
        with:
          name: mimir-image
          path: /tmp/mimir-image.tar.gz
          retention-days: 1

  compat-test:
    name: ${{ matrix.test }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - sdk-test-node
          - sdk-test-python
          - sdk-test-java # improving execution time
          - sdk-test-go
          - sdk-test-awscli
          - compat-cdk
          - compat-terraform
          - compat-opentofu

    steps:
      - name: Download mimir image
        uses: actions/download-artifact@v8
        with:
          name: mimir-image
          path: /tmp

      - name: Load mimir image
        run: gunzip -c /tmp/mimir-image.tar.gz | docker load

      - name: Create Docker network
        run: docker network create compat-net

      - name: Start mimir
        run: |
          DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
          docker run -d --name mimir --network compat-net \
            -p 4566:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --group-add "$DOCKER_GID" \
            -e MIMIR_BASE_URL=http://mimir:4566 \
            -e MIMIR_SERVICES_DOCKER_NETWORK=compat-net \
            -e MIMIR_HOSTNAME=mimir \
            -e MIMIR_SERVICES_LAMBDA_HOT_RELOAD_ENABLED=true \
            -e MIMIR_TLS_ENABLED=true \
            -e MIMIR_SERVICES_EC2_MOCK=true \
            mimir:test

      - name: Wait for mimir to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:4566/ >/dev/null 2>&1; do sleep 1; done'

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: compatibility-tests

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: compatibility-tests/${{ matrix.test }}
          load: true
          tags: compat-${{ matrix.test }}
          cache-from: type=gha,scope=${{ matrix.test }}
          cache-to: type=gha,scope=${{ matrix.test }},mode=max

      - name: Run tests
        id: tests
        run: |
          mkdir -p test-results
          MIMIR_IP=$(docker inspect -f '{{(index .NetworkSettings.Networks "compat-net").IPAddress}}' mimir)
          DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)

          EXTRA_ARGS=""
          # compat-cdk needs Docker access for CDK's DockerImageFunction (docker build + push to emulated ECR)
          if [ "${{ matrix.test }}" = "compat-cdk" ]; then
            EXTRA_ARGS="-v /var/run/docker.sock:/var/run/docker.sock --group-add $DOCKER_GID"
          fi

          # sdk-test-java: mount a host-side directory so the Docker daemon can
          # bind-mount hot-reload code paths that are written by the test container.
          if [ "${{ matrix.test }}" = "sdk-test-java" ]; then
            mkdir -p /tmp/mimir-hot-reload
            EXTRA_ARGS="$EXTRA_ARGS -v /tmp/mimir-hot-reload:/tmp/mimir-hot-reload -e HOT_RELOAD_BASE_DIR=/tmp/mimir-hot-reload"
          fi

          # --dns injects Mimir's embedded DNS so *.mimir wildcard subdomains
          # (e.g. my-bucket.mimir) resolve to Mimir's IP inside the test container.
          # MIMIR_S3_VHOST_ENDPOINT tells the S3 virtual-host client to use
          # http://mimir:4566 as the endpoint base instead of the public DNS fallback.
          docker run --rm --network compat-net \
            --dns "${MIMIR_IP}" \
            -e MIMIR_ENDPOINT=http://mimir:4566 \
            -e MIMIR_S3_VHOST_ENDPOINT=http://mimir:4566 \
            -v "$(pwd)/test-results:/results" \
            $EXTRA_ARGS \
            compat-${{ matrix.test }}

      - name: Generate test summary
        if: always() && steps.tests.outcome != 'skipped'
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        with:
          paths: test-results/*.xml

      - name: Dump mimir logs
        if: failure()
        run: docker logs mimir
