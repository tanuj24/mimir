# All-in-one nginx: serves the console and proxies /api to the server running
# in the SAME container (127.0.0.1:4000).

# WebSocket upgrade plumbing for the EC2 terminal.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No cap on S3 object uploads (0 = unlimited), just like real S3.
    client_max_body_size 0;

    # EC2 terminal — a long-lived WebSocket bridged to `docker exec`.
    location ~ ^/api/ec2/instances/[^/]+/terminal$ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API calls are proxied to the Mimir server in this container.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    # SPA fallback so client-side routes (e.g. /s3/my-bucket) resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
